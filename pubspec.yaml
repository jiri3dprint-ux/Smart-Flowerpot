name: flowerpot_app
description: Smart Flowerpot Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # MQTT
  mqtt_client: ^10.0.0
  
  # State Management
  provider: ^6.0.5
  
  # Charts & Graphs
  fl_chart: ^0.65.0
  
  # UI
  cupertino_icons: ^1.0.2
  flutter_colorpicker: ^1.0.3
  
  # Local Notifications (NO Firebase needed!)
  flutter_local_notifications: ^16.3.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/